name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG (x64)
            os: macos-latest
            goos: darwin
            goarch: amd64
            backend_binary: server
            pack_cmd: bunx electron-builder --mac dmg --x64 --publish never
            artifact_glob: |
              dist/*.dmg
              dist/latest-mac.yml
          - name: macOS DMG (arm64)
            os: macos-latest
            goos: darwin
            goarch: arm64
            backend_binary: server
            pack_cmd: bunx electron-builder --mac dmg --arm64 --publish never
            artifact_glob: |
              dist/*.dmg
          - name: Windows MSI (x64)
            os: windows-latest
            goos: windows
            goarch: amd64
            backend_binary: server.exe
            pack_cmd: bunx electron-builder --win msi --x64 --publish never
            artifact_glob: |
              dist/*.msi
              dist/latest.yml
          - name: Linux (deb + AppImage)
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            backend_binary: server
            pack_cmd: bunx electron-builder --linux deb AppImage --x64 --publish never
            artifact_glob: |
              dist/*.deb
              dist/*.AppImage
              dist/latest-linux.yml

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build backend binary
        shell: bash
        run: |
          mkdir -p bin
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bin/${{ matrix.backend_binary }} ./cmd/server
        working-directory: backend

      - name: Build renderer/main
        run: bun run build

      - name: Package desktop app
        run: ${{ matrix.pack_cmd }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
