appId: com.freessh.app
productName: FreeSSH
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  buildResources: build
files:
  - "out/**"
  - "package.json"
  - "resources/**"
  - "!**/*.map"
asarUnpack:
  - resources/**
extraResources:
  - from: backend/bin/
    to: backend
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  minimumSystemVersion: "12.0"
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
win:
  target:
    - target: msi
      arch:
        - x64
linux:
  category: Utility
  maintainer: Adelodun Peter <adelodunpeter69@gmail.com>
  target:
    - target: deb
      arch:
        - x64
    - target: AppImage
      arch:
        - x64
dmg:
  title: FreeSSH
npmRebuild: false
extraMetadata:
  description: A free, open-source, local-first SSH client.
  author: Adelodun Peter
